name: docker-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to push (e.g. v0.1.0). Leave empty to use 'latest'."
        required: false
        default: ""

env:
  OLLAMA_IMAGE: marcospace/idx-ollama-openvino
  IMPORTER_IMAGE: marcospace/idx-ollama-openvino-importer

jobs:
  resolve-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

  build-ollama:
    needs: resolve-version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OLLAMA_IMAGE }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./openvino
          file: ./openvino/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ollama
          cache-to: type=gha,mode=max,scope=ollama

  build-importer:
    needs: resolve-version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMPORTER_IMAGE }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./importer
          file: ./importer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=importer
          cache-to: type=gha,mode=max,scope=importer
