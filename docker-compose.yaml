services:
  ollama:
    image: marcospace/idx-ollama-openvino:latest
    container_name: ollama
    build:
      context: ./openvino
      dockerfile: Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/home/ollama/.ollama
      - ollama_imports:/models/imports:ro
    # Intel GPU + NPU passthrough
    devices:
      - /dev/dri:/dev/dri       # Integrated GPU (iGPU)
      - /dev/accel:/dev/accel   # NPU
    group_add:
      - "44"    # video
      - "105"   # render
      - "261"   # accel (varies by distro)
      - "226"   # systemd-journal (some setups)
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: always

  importer:
    image: marcospace/idx-ollama-openvino-importer:latest
    container_name: ollama-importer
    build:
      context: ./importer
      dockerfile: Dockerfile
    ports:
      - "3161:3161"
    volumes:
      - ollama_imports:/models/imports
      - importer_uploads:/uploads
    environment:
      - LISTEN_ADDR=:3161
      - OLLAMA_URL=http://ollama:11434
      - UPLOAD_DIR=/uploads
      - MODELS_IN_OLLAMA=/models/imports
    depends_on:
      - ollama
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3001:8080"
    volumes:
      - ./openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

volumes:
  ollama_data:
  openwebui_data:
  ollama_imports:
  importer_uploads:
